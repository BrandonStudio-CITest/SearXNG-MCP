name: Test

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      searxng:
        image: searxng/searxng:latest
        ports:
          - 8080:8080
        volumes:
          - /tmp/searxng_config:/etc/searxng
          - /tmp/searxng_data:/var/cache/searxng
      valkey:
        image: valkey/valkey:latest
        command: valkey-server --save 30 1 --loglevel warning
        ports:
          - 6379:6379
        volumes:
          - /tmp/valkey_data:/data

    steps:
      - name: Prepare SearXNG configuration
        run: |
          sudo apt install -y yq
          sudo yq -y -i '.search.formats = ["json"]' /tmp/searxng_config/settings.yml
          sudo docker restart ${{ job.services.searxng.id }}

      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable Corepack and install pnpm
        shell: pwsh
        run: |
          if (Get-Command corepack -ErrorAction SilentlyContinue) {
            corepack enable
            corepack prepare pnpm@latest --activate
          } else {
            npm install -g pnpm
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Prepare inspector
        run: npm install -g @modelcontextprotocol/inspector

      - name: Run and test
        env:
          SEARXNG_URL: http://localhost:8080
        run: pwsh -File "./tests/run_test.ps1"
